<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black City RolePlay</title>
    <style>
        /* БАРЛЫҚ CSS ОСЫ ЖЕРДЕ */
        body {
            margin: 0; padding: 0;
            background: #0b0b0b; color: white;
            font-family: 'Arial', sans-serif; text-align: center;
        }
        ..hero-section {
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), #0b0b0b), 
                        url('https://i.ytimg.com/vi/h8SOfy8xTzY/maxresdefault.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 65vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 30px;
            background-color: #1a1a1a; 
        }

        .play-btn {
            border: 2px solid white;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px 60px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 180px;
            transition: 0.3s;
        }
    <div class="hero-section">
        <div style="font-weight: bold; font-size: 24px; letter-spacing: 2px;">
            <span style="color: white;">BLACK</span> <span style="color: #ff4500;">CITY</span>
        </div>
        <a href="#" class="play-btn" onclick="alert('Жүктелуде...')">Играть</a>
    </div>

    <div class="main-title"><span class="orange-text">BLACK</span> CITY</div>
    <p class="description">Ролевая игра, где ты решаешь, кем быть. Присоединяйся к миллионам и забери своё.</p>

    </div>
</body>
</html>
