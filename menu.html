<!DOCTYPE html>
<html lang="kk">
<head>
  <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black City - Меню</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Нағыз Black Russia стиліндегі фон */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://sun9-23.userapi.com/impg/c858220/v858220935/195392/x_W-Gz_Z6vI.jpg?size=1280x720&quality=96&sign=c925823565e019323c626c7100780f2d&type=album');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
        }

        h1 {
            color: white;
            font-size: 32px;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(243, 156, 18, 0.7);
        }

        .menu-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .big-btn {
            width: 85%;
            max-width: 350px;
            padding: 20px;
            background: #f39c12; /* Сарғыш түс */
            color: black;
            text-align: center;
            text-decoration: none;
            font-size: 22px;
            font-weight: 900;
            border-radius: 15px;
            border: 3px solid #e67e22;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0,0,0,0.6);
            transition: 0.2s;
        }

        .big-btn:hover {
            transform: scale(1.05);
            background: #ffae00;
            box-shadow: 0 0 25px rgba(243, 156, 18, 0.5);
        }

        .play {
            background: #f39c12;
        }

        .forum {
            background: #f39c12;
        }

        .shop {
            background: #f39c12;
        }

        /* Төмендегі "Шығу" батырмасы */
        .exit-link {
            margin-top: 40px;
            color: #777;
            text-decoration: none;
            font-size: 14px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>БАСТЫ МӘЗІР</h1>

    <div class="menu-container">
        <a href="forum.html" class="big-btn">ФОРУМ</a>
        <a href="#" class="big-btn" onclick="alert('Дүкен жақында ашылады!')">ДҮКЕН</a>
        <a href="#" class="big-btn play" onclick="alert('Лаунчер дайындалуда...')">ОЙНАУ</a>
    </div>

    <a href="index.html" class="exit-link">Артқа қайту</a>

</body>
</html>
