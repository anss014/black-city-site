<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black City RolePlay</title>
    <style>
        body {
            margin: 0; padding: 0;
            background: #0b0b0b; color: white;
            font-family: 'Arial', sans-serif; text-align: center;
            overflow-x: hidden;
        }

        /* Фондағы сурет */
        .hero-section {
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), #0b0b0b), 
                        url('https://wallpapershome.ru/images/pages/pic_h/23565.jpg');
            background-size: cover; 
            background-position: center;
            height: 60vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: flex-start; 
            padding-top: 30px;
        }

<a href="play.html" class="play-btn">Играть</a>
        .play-btn {
            border: 2px solid white; 
            background: rgba(255, 255, 255, 0.1);
            color: white; 
            padding: 12px 60px; 
            font-size: 18px;
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold;
            text-transform: uppercase; 
            margin-top: 140px; 
            transition: 0.3s;
            display: inline-block;
            animation: glow 2s infinite; /* Жарқырау анимациясы */
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(255, 255, 255, 0.6); }
            100% { box-shadow: 0 0 5px rgba(255, 255, 255, 0.2); }
        }

        .play-btn:hover { background: white; color: black; transform: scale(1.05); }

        .main-title { margin-top: 20px; font-size: 32px; font-weight: 900; text-transform: uppercase; }
        .orange-text { color: #ff4500; }
        .description { padding: 0 20px; font-size: 14px; color: #aaa; max-width: 500px; margin: 15px auto; }

        /* Төменгі мәзір */
        .bottom-nav { display: flex; justify-content: center; gap: 20px; margin-top: 20px; padding-bottom: 40px; }
        .nav-item { 
            color: #ff4500; 
            text-decoration: none; 
            font-weight: bold; 
            text-transform: uppercase; 
            font-size: 14px; 
            transition: 0.3s;
        }
        .nav-item:hover { text-shadow: 0 0 10px #ff4500; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div style="font-weight: bold; font-size: 24px; letter-spacing: 2px;">
            <span style="color: white;">BLACK</span> <span style="color: #ff4500;">CITY</span>
        </div>
        <a href="play.html" class="play-btn">Играть</a>
    </div>

    <div class="main-title"><span class="orange-text">BLACK</span> CITY</div>
    
    <div style="margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 10px;">
        <div style="width: 10px; height: 10px; background: #2ecc71; border-radius: 50%; box-shadow: 0 0 10px #2ecc71;"></div>
        <span style="font-size: 14px; font-weight: bold; color: #2ecc71;">ONLINE: 245/500</span>
    </div>

    <p class="description">Бұл сенің тағдырың шешілетін әлем. Миллиондаған ойыншыларға қосыл және өз абыройыңды асқақтат!</p>

    <div class="bottom-nav">
        <a href="forum.html" class="nav-item">Форум</a>
        <a href="#" class="nav-item">Дүкен</a>
        <a href="index.html" class="nav-item">Шығу</a>
    </div>
</body>
</html>
