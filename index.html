<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black City - Регистрация</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Минимальные стили, чтобы всё выглядело ровно */
        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .reg-form {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #333;
        }
        input {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            border: none;
        }
        button {
            background: #f39c12;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="reg-form">
        <h2>ТІРКЕЛУ</h2>
        
        <input type="text" id="u_nick" placeholder="Никнейм">
        <input type="email" id="u_mail" placeholder="E-mail">
        <input type="password" id="u_pass" placeholder="Құпия сөз">
        
        <button type="button" onclick="saylem()">Тіркелу</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
